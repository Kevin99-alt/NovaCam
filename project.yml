name: NovaCam
options:
  bundleIdPrefix: com.novacam
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

targets:
  NovaCam:
    type: application
    platform: iOS
    sources:
      - path: App
        type: group
      - path: Camera
        type: group
      - path: AI
        type: group
      - path: Core
        type: group
      - path: Settings
        type: group
      - path: Resources
        type: group
        excludes:
          - "**/Assets.xcassets/**"
          - "**/Fonts/**"
          - "**/Localization/**"
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.novacam.ios
        PRODUCT_NAME: NovaCam
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: "NO"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
    info:
      path: Resources/Info.plist
